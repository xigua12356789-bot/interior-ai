<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>空间AI · 效果图生成</title>
<style>
  :root {
    --green: #2A7A5A;
    --green-light: #E1F5EE;
    --green-dark: #1D5A42;
    --bg: #F5F3F0;
    --surface: #FFFFFF;
    --border: #E8E4DE;
    --text: #1A1A18;
    --muted: #8A8A86;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; color: var(--text); }

  /* ── Layout ── */
  .app { display: flex; flex-direction: column; min-height: 100vh; max-width: 480px; margin: 0 auto; background: var(--bg); }

  /* ── Header ── */
  .header { background: var(--green); padding: 16px 20px 20px; color: white; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .header-logo { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .header-logo span { opacity: 0.7; font-weight: 400; }
  .header-store { font-size: 12px; opacity: 0.7; }
  .header-sub { font-size: 13px; opacity: 0.85; }

  /* ── Steps bar ── */
  .steps { background: var(--surface); padding: 14px 20px; display: flex; gap: 0; border-bottom: 1px solid var(--border); }
  .step { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; position: relative; }
  .step::after { content: ''; position: absolute; top: 12px; left: 60%; width: 80%; height: 1.5px; background: var(--border); z-index: 0; }
  .step:last-child::after { display: none; }
  .step-dot { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; z-index: 1; transition: all .3s; }
  .step-dot.active { background: var(--green); color: white; }
  .step-dot.done { background: var(--green-light); color: var(--green); }
  .step-dot.inactive { background: #F0F0EE; color: #CCCCCC; }
  .step-label { font-size: 10px; color: var(--muted); }
  .step-label.active { color: var(--green); font-weight: 500; }

  /* ── Content ── */
  .content { flex: 1; padding: 16px; }

  /* ── Cards ── */
  .card { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; border: 1px solid var(--border); }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .card-title-icon { font-size: 16px; }

  /* ── Upload zone ── */
  .upload-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 32px 20px; text-align: center; cursor: pointer; transition: all .2s; background: #FAFAF8; }
  .upload-zone:active { background: var(--green-light); border-color: var(--green); }
  .upload-icon { font-size: 36px; margin-bottom: 8px; }
  .upload-text { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .upload-sub { font-size: 12px; color: var(--muted); }
  #photoInput, #productInput { display: none; }

  /* ── Canvas area ── */
  .canvas-wrap { position: relative; border-radius: 12px; overflow: hidden; background: #F0EDE8; }
  #drawCanvas { display: block; width: 100%; cursor: crosshair; touch-action: none; }
  .canvas-hint { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: white; font-size: 11px; padding: 4px 10px; border-radius: 20px; white-space: nowrap; pointer-events: none; }
  .brush-controls { display: flex; align-items: center; gap: 12px; margin-top: 10px; }
  .brush-label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  input[type=range] { flex: 1; accent-color: var(--green); }
  .brush-preview { width: 32px; height: 32px; border-radius: 50%; background: rgba(42,122,90,0.3); border: 2px solid var(--green); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .clear-btn { font-size: 12px; color: var(--green); background: var(--green-light); border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; white-space: nowrap; }

  /* ── Type selector ── */
  .type-tabs { display: flex; gap: 8px; margin-bottom: 0; }
  .type-tab { flex: 1; padding: 10px 8px; text-align: center; border-radius: 10px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1.5px solid var(--border); background: #FAFAF8; color: var(--muted); transition: all .2s; }
  .type-tab.active { background: var(--green-light); border-color: var(--green); color: var(--green); }

  /* ── Product grid ── */
  .products-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .product-item { border-radius: 10px; overflow: hidden; border: 2px solid transparent; cursor: pointer; transition: all .2s; background: #F5F3F0; }
  .product-item.selected { border-color: var(--green); }
  .product-thumb { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: #E8E4DE; }
  .product-thumb-placeholder { width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 28px; background: #F0EDE8; }
  .product-name { font-size: 10px; color: var(--text); text-align: center; padding: 5px 4px; background: white; line-height: 1.3; }
  .add-product-btn { border: 2px dashed var(--border); border-radius: 10px; aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; background: #FAFAF8; font-size: 22px; color: var(--muted); gap: 4px; }
  .add-product-text { font-size: 10px; color: var(--muted); }

  /* ── Generate button ── */
  .gen-btn { width: 100%; padding: 16px; background: var(--green); color: white; border: none; border-radius: 14px; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all .2s; margin-top: 4px; }
  .gen-btn:disabled { background: #C8C4BE; cursor: not-allowed; }
  .gen-btn:active:not(:disabled) { transform: scale(0.98); background: var(--green-dark); }
  .loading-dots { display: flex; gap: 4px; }
  .loading-dots span { width: 6px; height: 6px; border-radius: 50%; background: white; animation: dot 1.2s infinite; }
  .loading-dots span:nth-child(2) { animation-delay: .2s; }
  .loading-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes dot { 0%,80%,100%{opacity:.3;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }

  /* ── Result ── */
  .result-wrap { border-radius: 12px; overflow: hidden; position: relative; }
  .result-img { width: 100%; display: block; }
  .result-badge { position: absolute; top: 10px; left: 10px; background: rgba(42,122,90,0.9); color: white; font-size: 11px; padding: 4px 10px; border-radius: 20px; backdrop-filter: blur(4px); }
  .compare-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
  .compare-item { border-radius: 10px; overflow: hidden; }
  .compare-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; }
  .compare-label { text-align: center; font-size: 11px; color: var(--muted); padding: 5px; background: white; }
  .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
  .action-btn { padding: 13px; border-radius: 12px; font-size: 14px; font-weight: 500; text-align: center; cursor: pointer; border: none; transition: all .2s; }
  .action-btn.primary { background: var(--green); color: white; }
  .action-btn.secondary { background: #F0F0EE; color: var(--text); }
  .action-btn:active { transform: scale(0.97); }

  /* ── Product info card ── */
  .product-info { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; background: #F5F3F0; border-radius: 10px; margin-top: 10px; }
  .product-info-name { font-size: 13px; font-weight: 500; }
  .product-info-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .product-info-price { font-size: 16px; font-weight: 700; color: var(--green); }

  /* ── Bottom nav ── */
  .bottom-nav { background: var(--surface); border-top: 1px solid var(--border); display: flex; padding: 10px 0 20px; position: sticky; bottom: 0; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; }
  .nav-icon { font-size: 22px; }
  .nav-label { font-size: 10px; color: var(--muted); }
  .nav-item.active .nav-label { color: var(--green); font-weight: 500; }

  /* ── Toast ── */
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.75); color: white; font-size: 13px; padding: 10px 20px; border-radius: 20px; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }

  /* ── API Key setup ── */
  .setup-card { background: var(--surface); border-radius: var(--radius); padding: 20px; margin: 16px; border: 1px solid var(--border); }
  .setup-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
  .setup-desc { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.7; }
  .setup-input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; font-family: monospace; outline: none; }
  .setup-input:focus { border-color: var(--green); }
  .setup-btn { width: 100%; padding: 14px; background: var(--green); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 12px; }
  .setup-note { font-size: 11px; color: var(--muted); margin-top: 10px; line-height: 1.6; }
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-top">
      <div class="header-logo">空间<span>AI</span></div>
      <div class="header-store" id="storeName">门店员工端</div>
    </div>
    <div class="header-sub">上传客户家的照片，AI一键替换产品</div>
  </div>

  <!-- Main content -->
  <div id="mainContent">

    <!-- Step indicator -->
    <div class="steps" id="stepsBar">
      <div class="step">
        <div class="step-dot active" id="dot1">1</div>
        <div class="step-label active" id="lbl1">上传照片</div>
      </div>
      <div class="step">
        <div class="step-dot inactive" id="dot2">2</div>
        <div class="step-label" id="lbl2">涂抹区域</div>
      </div>
      <div class="step">
        <div class="step-dot inactive" id="dot3">3</div>
        <div class="step-label" id="lbl3">选产品</div>
      </div>
      <div class="step">
        <div class="step-dot inactive" id="dot4">4</div>
        <div class="step-label" id="lbl4">生成</div>
      </div>
    </div>

    <div class="content">

      <!-- Step 1: Upload photo -->
      <div id="step1">
        <div class="card">
          <div class="card-title"><span class="card-title-icon">📸</span>上传客户家的照片</div>
          <div class="upload-zone" onclick="document.getElementById('photoInput').click()">
            <div class="upload-icon">🏠</div>
            <div class="upload-text">点击上传照片</div>
            <div class="upload-sub">支持拍照或从相册选择</div>
          </div>
          <input type="file" id="photoInput" accept="image/*" capture="environment">
        </div>
        <div class="card" style="background:#FFF8E7;border-color:#FAC775;">
          <div style="font-size:12px;color:#633806;line-height:1.8;">
            💡 <strong>拍照建议</strong><br>
            · 光线充足，避免强烈逆光<br>
            · 正面拍摄要替换的区域<br>
            · 保持手机稳定，避免模糊
          </div>
        </div>
      </div>

      <!-- Step 2: Draw mask -->
      <div id="step2" style="display:none;">
        <div class="card">
          <div class="card-title"><span class="card-title-icon">✏️</span>涂抹要替换的区域</div>
          <div class="canvas-wrap">
            <canvas id="drawCanvas"></canvas>
            <div class="canvas-hint">用手指涂抹要替换的区域</div>
          </div>
          <div class="brush-controls">
            <span class="brush-label">笔刷大小</span>
            <input type="range" id="brushSize" min="10" max="80" value="30">
            <div class="brush-preview" id="brushPreview"></div>
            <button class="clear-btn" onclick="clearMask()">重新涂</button>
          </div>
        </div>

        <!-- Replace type -->
        <div class="card">
          <div class="card-title"><span class="card-title-icon">🔄</span>替换类型</div>
          <div class="type-tabs">
            <div class="type-tab active" onclick="selectType(this,'furniture')">🛋️ 家具</div>
            <div class="type-tab" onclick="selectType(this,'wallpaper')">🎨 壁纸</div>
            <div class="type-tab" onclick="selectType(this,'floor')">🪵 地板</div>
          </div>
        </div>

        <button class="gen-btn" onclick="goToStep3()" id="toStep3Btn">
          下一步：选择产品
        </button>
      </div>

      <!-- Step 3: Select product -->
      <div id="step3" style="display:none;">
        <div class="card">
          <div class="card-title"><span class="card-title-icon">🛋️</span>选择替换产品</div>
          <div class="products-grid" id="productsGrid">
            <!-- Products injected here -->
          </div>
        </div>

        <button class="gen-btn" onclick="startGenerate()" id="generateBtn" disabled>
          ✨ AI 生成效果图
        </button>
      </div>

      <!-- Step 4: Result -->
      <div id="step4" style="display:none;">
        <div class="card">
          <div class="card-title"><span class="card-title-icon">✨</span>生成结果</div>
          <div class="result-wrap">
            <img id="resultImg" class="result-img" src="" alt="效果图">
            <div class="result-badge" id="resultBadge">✓ 替换完成</div>
          </div>
          <div class="compare-wrap">
            <div class="compare-item">
              <img id="compareOrig" class="compare-img" src="" alt="原图">
              <div class="compare-label">改造前</div>
            </div>
            <div class="compare-item">
              <img id="compareResult" class="compare-img" src="" alt="效果图">
              <div class="compare-label">改造后</div>
            </div>
          </div>
          <div class="product-info" id="selectedProductInfo" style="display:none;">
            <div>
              <div class="product-info-name" id="infoName"></div>
              <div class="product-info-sub" id="infoSub"></div>
            </div>
            <div class="product-info-price" id="infoPrice"></div>
          </div>
        </div>

        <div class="action-row">
          <button class="action-btn primary" onclick="shareResult()">📤 发给客户</button>
          <button class="action-btn secondary" onclick="retryGenerate()">🔄 换个款式</button>
        </div>
        <button class="action-btn" style="width:100%;margin-top:10px;background:#F0F0EE;color:var(--text);border:none;border-radius:12px;padding:13px;font-size:14px;cursor:pointer;" onclick="newPhoto()">
          📸 重新上传照片
        </button>
      </div>

    </div><!-- /content -->

  </div><!-- /mainContent -->

  <!-- Bottom nav -->
  <div class="bottom-nav">
    <div class="nav-item active">
      <div class="nav-icon">✨</div>
      <div class="nav-label" style="color:var(--green);">生成</div>
    </div>
    <div class="nav-item">
      <div class="nav-icon">📋</div>
      <div class="nav-label">记录</div>
    </div>
    <div class="nav-item">
      <div class="nav-icon">🛋️</div>
      <div class="nav-label">产品库</div>
    </div>
    <div class="nav-item">
      <div class="nav-icon">👤</div>
      <div class="nav-label">我的</div>
    </div>
  </div>

</div><!-- /app -->

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── 配置区（填你自己的信息）──────────────────────────────────────────────────
const CONFIG = {
  API_KEY: '在这里填入你的阿里云API Key',   //  sk-bc644f0d5e7b459a9055e16a3a65f26e
  STORE_NAME: '门店名称',                    // 替换成商家名称
}

// ── 示例产品库（正式版从后台读取）───────────────────────────────────────────
const PRODUCTS = [
  { id:1, name:'米白布艺沙发', type:'furniture', price:'¥4,980', emoji:'🛋️', desc:'三人位 · 现代简约' },
  { id:2, name:'深灰皮革沙发', type:'furniture', price:'¥6,580', emoji:'🪑', desc:'三人位 · 轻奢风格' },
  { id:3, name:'原木北欧沙发', type:'furniture', price:'¥3,980', emoji:'🛋️', desc:'双人位 · 北欧风' },
  { id:4, name:'莫兰迪灰壁纸', type:'wallpaper', price:'¥180/卷', emoji:'🎨', desc:'素色 · 哑光质感' },
  { id:5, name:'轻奢大理石纹', type:'wallpaper', price:'¥260/卷', emoji:'🖼️', desc:'石纹 · 高档质感' },
  { id:6, name:'北欧几何图案', type:'wallpaper', price:'¥150/卷', emoji:'🎭', desc:'几何 · 时尚简约' },
  { id:7, name:'复古实木地板', type:'floor', price:'¥280/㎡', emoji:'🪵', desc:'橡木 · 哑光处理' },
  { id:8, name:'现代灰色地板', type:'floor', price:'¥220/㎡', emoji:'⬜', desc:'灰色 · 现代简约' },
]

// ── 状态 ─────────────────────────────────────────────────────────────────────
let originalImageDataURL = null
let maskDataURL = null
let selectedProduct = null
let replaceType = 'furniture'
let isDrawing = false
let lastX = 0, lastY = 0
let brushSize = 30

// ── 初始化 ───────────────────────────────────────────────────────────────────
document.getElementById('storeName').textContent = CONFIG.STORE_NAME
document.getElementById('photoInput').addEventListener('change', onPhotoSelected)
document.getElementById('brushSize').addEventListener('input', function() {
  brushSize = parseInt(this.value)
  const p = document.getElementById('brushPreview')
  const s = Math.max(12, Math.min(brushSize, 32))
  p.style.width = s + 'px'
  p.style.height = s + 'px'
})
renderProducts()

// ── 步骤导航 ─────────────────────────────────────────────────────────────────
function setStep(n) {
  ;[1,2,3,4].forEach(i => {
    document.getElementById('step'+i).style.display = i===n ? 'block' : 'none'
    const dot = document.getElementById('dot'+i)
    const lbl = document.getElementById('lbl'+i)
    if (i < n) {
      dot.className = 'step-dot done'; dot.textContent = '✓'
      lbl.className = 'step-label'
    } else if (i === n) {
      dot.className = 'step-dot active'; dot.textContent = i
      lbl.className = 'step-label active'
    } else {
      dot.className = 'step-dot inactive'; dot.textContent = i
      lbl.className = 'step-label'
    }
  })
}

// ── Step 1: 上传照片 ──────────────────────────────────────────────────────────
function onPhotoSelected(e) {
  const file = e.target.files[0]
  if (!file) return
  const reader = new FileReader()
  reader.onload = function(ev) {
    originalImageDataURL = ev.target.result
    initCanvas(ev.target.result)
    setStep(2)
  }
  reader.readAsDataURL(file)
}

// ── Step 2: 画遮罩 ────────────────────────────────────────────────────────────
function initCanvas(imgSrc) {
  const canvas = document.getElementById('drawCanvas')
  const ctx = canvas.getContext('2d')
  const img = new Image()
  img.onload = function() {
    const maxW = Math.min(window.innerWidth - 64, 440)
    const ratio = img.height / img.width
    canvas.width = maxW
    canvas.height = maxW * ratio
    canvas.style.width = '100%'
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height)
    canvas._bgImg = img
  }
  img.src = imgSrc
}

function getPos(e, canvas) {
  const rect = canvas.getBoundingClientRect()
  const scaleX = canvas.width / rect.width
  const scaleY = canvas.height / rect.height
  const src = e.touches ? e.touches[0] : e
  return {
    x: (src.clientX - rect.left) * scaleX,
    y: (src.clientY - rect.top) * scaleY
  }
}

const canvas = document.getElementById('drawCanvas')
;['mousedown','touchstart'].forEach(ev => canvas.addEventListener(ev, function(e) {
  e.preventDefault(); isDrawing = true
  const p = getPos(e, canvas); lastX = p.x; lastY = p.y
  drawDot(p.x, p.y)
}, { passive: false }))

;['mousemove','touchmove'].forEach(ev => canvas.addEventListener(ev, function(e) {
  e.preventDefault(); if (!isDrawing) return
  const p = getPos(e, canvas)
  drawLine(lastX, lastY, p.x, p.y)
  lastX = p.x; lastY = p.y
}, { passive: false }))

;['mouseup','touchend','mouseleave'].forEach(ev => canvas.addEventListener(ev, function() {
  isDrawing = false
}))

function drawDot(x, y) {
  const ctx = canvas.getContext('2d')
  ctx.beginPath()
  ctx.arc(x, y, brushSize/2, 0, Math.PI*2)
  ctx.fillStyle = 'rgba(42,122,90,0.45)'
  ctx.fill()
}

function drawLine(x1, y1, x2, y2) {
  const ctx = canvas.getContext('2d')
  ctx.beginPath()
  ctx.moveTo(x1, y1)
  ctx.lineTo(x2, y2)
  ctx.strokeStyle = 'rgba(42,122,90,0.45)'
  ctx.lineWidth = brushSize
  ctx.lineCap = 'round'
  ctx.lineJoin = 'round'
  ctx.stroke()
}

function clearMask() {
  const ctx = canvas.getContext('2d')
  ctx.clearRect(0, 0, canvas.width, canvas.height)
  if (canvas._bgImg) ctx.drawImage(canvas._bgImg, 0, 0, canvas.width, canvas.height)
}

function getMaskDataURL() {
  // 生成纯黑白遮罩图（白色=替换区域，黑色=保留区域）
  const offCanvas = document.createElement('canvas')
  offCanvas.width = canvas.width
  offCanvas.height = canvas.height
  const offCtx = offCanvas.getContext('2d')
  offCtx.fillStyle = 'black'
  offCtx.fillRect(0, 0, offCanvas.width, offCanvas.height)
  // 把涂抹区域变白色
  const origCtx = canvas.getContext('2d')
  const imgData = origCtx.getImageData(0, 0, canvas.width, canvas.height)
  const origData = offCtx.getImageData(0, 0, offCanvas.width, offCanvas.height)
  if (canvas._bgImg) {
    // 对比原图，找到涂抹区域（绿色半透明区域）
    const bgCanvas = document.createElement('canvas')
    bgCanvas.width = canvas.width; bgCanvas.height = canvas.height
    const bgCtx = bgCanvas.getContext('2d')
    bgCtx.drawImage(canvas._bgImg, 0, 0, canvas.width, canvas.height)
    const bgData = bgCtx.getImageData(0, 0, canvas.width, canvas.height)
    for (let i = 0; i < imgData.data.length; i += 4) {
      const dr = imgData.data[i] - bgData.data[i]
      const dg = imgData.data[i+1] - bgData.data[i+1]
      const db = imgData.data[i+2] - bgData.data[i+2]
      // 绿色涂抹区域 R通道变化小，G通道增加
      if (dg > 20 || (Math.abs(dr) + Math.abs(dg) + Math.abs(db) > 30)) {
        origData.data[i] = 255; origData.data[i+1] = 255
        origData.data[i+2] = 255; origData.data[i+3] = 255
      }
    }
  } else {
    // 简单模式：全白
    for (let i = 0; i < origData.data.length; i += 4) {
      origData.data[i] = origData.data[i+1] = origData.data[i+2] = 255
      origData.data[i+3] = 255
    }
  }
  offCtx.putImageData(origData, 0, 0)
  return offCanvas.toDataURL('image/png')
}

function selectType(el, type) {
  replaceType = type
  document.querySelectorAll('.type-tab').forEach(t => t.classList.remove('active'))
  el.classList.add('active')
  renderProducts()
}

function goToStep3() {
  maskDataURL = getMaskDataURL()
  setStep(3)
}

// ── Step 3: 选产品 ────────────────────────────────────────────────────────────
function renderProducts() {
  const grid = document.getElementById('productsGrid')
  if (!grid) return
  const filtered = PRODUCTS.filter(p => p.type === replaceType)
  grid.innerHTML = filtered.map(p => `
    <div class="product-item" id="prod_${p.id}" onclick="selectProduct(${p.id})">
      <div class="product-thumb-placeholder">${p.emoji}</div>
      <div class="product-name">${p.name}</div>
    </div>
  `).join('') + `
    <div class="add-product-btn" onclick="addProduct()">
      <span>+</span>
      <span class="add-product-text">上传产品</span>
    </div>
  `
}

function selectProduct(id) {
  selectedProduct = PRODUCTS.find(p => p.id === id)
  document.querySelectorAll('.product-item').forEach(el => el.classList.remove('selected'))
  document.getElementById('prod_'+id)?.classList.add('selected')
  document.getElementById('generateBtn').disabled = false
}

function addProduct() {
  showToast('产品库管理请在商家后台操作')
}

// ── Step 4: AI 生成 ───────────────────────────────────────────────────────────
async function startGenerate() {
  if (!selectedProduct) { showToast('请先选择产品'); return }

  const btn = document.getElementById('generateBtn')
  btn.disabled = true
  btn.innerHTML = `<div class="loading-dots"><span></span><span></span><span></span></div> AI 生成中，请稍候…`

  try {
    // 准备提示词（根据替换类型和产品）
    const prompts = {
      furniture: `Replace the furniture with a ${selectedProduct.name}, photorealistic interior design, natural lighting, high quality, seamless integration, 8k resolution`,
      wallpaper: `Replace the wall with ${selectedProduct.name} wallpaper pattern, photorealistic interior, natural lighting, high quality, seamless wall texture`,
      floor: `Replace the floor with ${selectedProduct.name} flooring, photorealistic interior design, natural lighting, high quality, seamless flooring material`
    }
    const prompt = prompts[replaceType]

    // 转换图片为 base64（去掉前缀）
    const imageBase64 = originalImageDataURL.split(',')[1]
    const maskBase64 = maskDataURL.split(',')[1]

    // 调用阿里云通义万相 Inpainting API
    const response = await fetch('https://dashscope.aliyuncs.com/api/v1/services/aigc/image2image/image-synthesis', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${CONFIG.API_KEY}`,
        'Content-Type': 'application/json',
        'X-DashScope-Async': 'enable'
      },
      body: JSON.stringify({
        model: 'wanx-v1',
        input: {
          prompt: prompt,
          negative_prompt: 'blurry, low quality, distorted, unrealistic, cartoon',
          image: imageBase64,
          mask_image: maskBase64
        },
        parameters: {
          size: '1024*1024',
          n: 1,
          steps: 30,
          strength: 0.7   // 关键参数：控制替换强度，0.6-0.75最佳
        }
      })
    })

    const data = await response.json()

    if (data.output?.task_id) {
      // 异步任务，轮询等待结果
      await pollResult(data.output.task_id)
    } else if (data.output?.results?.[0]?.url) {
      showResult(data.output.results[0].url)
    } else {
      throw new Error(data.message || '生成失败，请重试')
    }

  } catch (err) {
    console.error(err)
    btn.disabled = false
    btn.innerHTML = '✨ AI 生成效果图'
    showToast('生成失败：' + err.message)
  }
}

async function pollResult(taskId, retries = 30) {
  for (let i = 0; i < retries; i++) {
    await new Promise(r => setTimeout(r, 3000))
    const res = await fetch(`https://dashscope.aliyuncs.com/api/v1/tasks/${taskId}`, {
      headers: { 'Authorization': `Bearer ${CONFIG.API_KEY}` }
    })
    const data = await res.json()
    const status = data.output?.task_status

    if (status === 'SUCCEEDED') {
      const url = data.output?.results?.[0]?.url
      if (url) { showResult(url); return }
    } else if (status === 'FAILED') {
      throw new Error('AI生成任务失败，请重试')
    }
    // RUNNING 继续等待
  }
  throw new Error('等待超时，请重试')
}

function showResult(url) {
  document.getElementById('resultImg').src = url
  document.getElementById('compareOrig').src = originalImageDataURL
  document.getElementById('compareResult').src = url

  if (selectedProduct) {
    document.getElementById('selectedProductInfo').style.display = 'flex'
    document.getElementById('infoName').textContent = selectedProduct.name
    document.getElementById('infoSub').textContent = selectedProduct.desc || ''
    document.getElementById('infoPrice').textContent = selectedProduct.price || ''
    document.getElementById('resultBadge').textContent = `✓ 已替换为${selectedProduct.name}`
  }
  setStep(4)
}

function retryGenerate() {
  setStep(3)
  selectedProduct = null
  document.querySelectorAll('.product-item').forEach(el => el.classList.remove('selected'))
  document.getElementById('generateBtn').disabled = true
  document.getElementById('generateBtn').innerHTML = '✨ AI 生成效果图'
}

function newPhoto() {
  originalImageDataURL = null; maskDataURL = null; selectedProduct = null
  document.getElementById('photoInput').value = ''
  setStep(1)
}

// ── 分享 ──────────────────────────────────────────────────────────────────────
function shareResult() {
  const resultUrl = document.getElementById('resultImg').src
  if (navigator.share) {
    navigator.share({ title: '效果图', text: `${selectedProduct?.name || ''}效果图`, url: resultUrl })
      .catch(() => copyToClipboard(resultUrl))
  } else {
    copyToClipboard(resultUrl)
  }
}

function copyToClipboard(text) {
  navigator.clipboard?.writeText(text).then(() => showToast('链接已复制，可发给客户'))
    .catch(() => showToast('请长按图片保存后发给客户'))
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg; t.classList.add('show')
  setTimeout(() => t.classList.remove('show'), 2500)
}
</script>
